apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sg-cosi-driver
  labels:
    app.kubernetes.io/name: sg-cosi-driver
rules:
  - apiGroups: ["objectstorage.k8s.io"]
    resources:
      - buckets
      - bucketclaims
      - bucketaccesses
      - bucketaccessclasses
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["objectstorage.k8s.io"]
    resources:
      - buckets/status
      - bucketaccesses/status
      - bucketclaims/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
