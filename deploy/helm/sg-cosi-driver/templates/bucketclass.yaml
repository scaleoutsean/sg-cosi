{{- if .Values.bucketClass.create }}
apiVersion: objectstorage.k8s.io/v1alpha1
kind: BucketClass
metadata:
  name: {{ include "sg-cosi-driver.bucketClassName" . }}
  labels:
    {{- include "sg-cosi-driver.labels" . | nindent 4 }}
driverName: {{ include "sg-cosi-driver.driverName" . }}
deletionPolicy: {{ .Values.bucketClass.deletionPolicy }}
{{- with .Values.bucketClass.parameters }}
parameters:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
